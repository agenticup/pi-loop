<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" width="800" height="900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0f11"/>
      <stop offset="100%" stop-color="#1a1a1e"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3cffd0"/>
      <stop offset="100%" stop-color="#2ae0b0"/>
    </linearGradient>
    <linearGradient id="uv" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5200ff"/>
      <stop offset="100%" stop-color="#7b3aff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="900" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="400" y="60" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="#3cffd0" filter="url(#glow)">pi-loop</text>
  <text x="400" y="90" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#888">decompose → solve → critique → iterate → synthesize</text>

  <!-- Arrow connectors around the circle -->
  <!-- Arc path for the circle -->
  <circle cx="400" cy="420" r="220" fill="none" stroke="#2a2a30" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- Phase 1: DECOMPOSE (top) -->
  <rect x="300" y="140" width="200" height="60" rx="10" fill="#1a1a1e" stroke="#3cffd0" stroke-width="2"/>
  <text x="400" y="169" text-anchor="middle" font-family="monospace" font-size="11" fill="#3cffd0" font-weight="bold">PHASE 1</text>
  <text x="400" y="188" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#fff" font-weight="bold">DECOMPOSE</text>

  <!-- Arrow from 1 to 2 -->
  <path d="M 500 170 Q 600 220 600 320" fill="none" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <circle cx="590" cy="240" r="14" fill="#2a2a30" stroke="#555" stroke-width="1"/>
  <text x="590" y="244" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">→</text>

  <!-- Phase 2: SOLVE (right) -->
  <rect x="540" y="340" width="180" height="60" rx="10" fill="#1a1a1e" stroke="#3cffd0" stroke-width="2"/>
  <text x="630" y="369" text-anchor="middle" font-family="monospace" font-size="11" fill="#3cffd0" font-weight="bold">PHASE 2</text>
  <text x="630" y="388" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#fff" font-weight="bold">SOLVE</text>

  <!-- Concurrency badge -->
  <rect x="650" y="405" width="60" height="20" rx="4" fill="#2a3a30" stroke="#3cffd0" stroke-width="0.5"/>
  <text x="680" y="419" text-anchor="middle" font-family="monospace" font-size="9" fill="#3cffd0">parallel</text>

  <!-- Arrow from 2 to 3 -->
  <path d="M 620 400 Q 540 500 450 540" fill="none" stroke="#555" stroke-width="2"/>
  <circle cx="540" cy="490" r="14" fill="#2a2a30" stroke="#555" stroke-width="1"/>
  <text x="540" y="494" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">→</text>

  <!-- Phase 3: CRITIQUE (bottom-right) -->
  <rect x="310" y="560" width="200" height="60" rx="10" fill="#1a1a1e" stroke="#3cffd0" stroke-width="2"/>
  <text x="410" y="589" text-anchor="middle" font-family="monospace" font-size="11" fill="#3cffd0" font-weight="bold">PHASE 3</text>
  <text x="410" y="608" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#fff" font-weight="bold">CRITIQUE</text>

  <!-- Pass/Iterate gate -->
  <rect x="330" y="628" width="160" height="24" rx="4" fill="#1a1a1e" stroke="#5200ff" stroke-width="1"/>
  <text x="410" y="644" text-anchor="middle" font-family="monospace" font-size="10" fill="#7b3aff">PASS / ITERATE gate</text>

  <!-- Arrow from 3 to 4 (iterate back) -->
  <path d="M 310 590 L 180 530 Q 140 500 180 420" fill="none" stroke="#5200ff" stroke-width="2" stroke-dasharray="5 3"/>
  <rect x="120" y="460" width="80" height="20" rx="4" fill="#1a0a2e" stroke="#5200ff" stroke-width="0.5"/>
  <text x="160" y="474" text-anchor="middle" font-family="monospace" font-size="9" fill="#7b3aff">iterate</text>

  <!-- Phase 4: ITERATE (left) -->
  <rect x="80" y="340" width="180" height="60" rx="10" fill="#1a1a1e" stroke="#5200ff" stroke-width="2"/>
  <text x="170" y="369" text-anchor="middle" font-family="monospace" font-size="11" fill="#5200ff" font-weight="bold">PHASE 4</text>
  <text x="170" y="388" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#fff" font-weight="bold">ITERATE</text>

  <!-- Max 2 badge -->
  <rect x="90" y="405" width="80" height="20" rx="4" fill="#1a0a2e" stroke="#5200ff" stroke-width="0.5"/>
  <text x="130" y="419" text-anchor="middle" font-family="monospace" font-size="9" fill="#7b3aff">max 2 rounds</text>

  <!-- Arrow from 4 to 5 -->
  <path d="M 180 340 Q 120 220 300 170" fill="none" stroke="#555" stroke-width="2"/>
  <circle cx="200" cy="240" r="14" fill="#2a2a30" stroke="#555" stroke-width="1"/>
  <text x="200" y="244" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">→</text>

  <!-- Phase 5: SYNTHESIZE (center) -->
  <circle cx="400" cy="420" r="60" fill="url(#mint)" opacity="0.15"/>
  <circle cx="400" cy="420" r="45" fill="url(#mint)" opacity="0.1"/>
  <rect x="320" y="400" width="160" height="50" rx="25" fill="url(#mint)"/>
  <text x="400" y="422" text-anchor="middle" font-family="monospace" font-size="10" fill="#0a0a0a" font-weight="bold">PHASE 5</text>
  <text x="400" y="440" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#0a0a0a" font-weight="bold">SYNTHESIZE</text>

  <!-- Result arrow going down -->
  <rect x="350" y="710" width="100" height="30" rx="6" fill="#2a2a30" stroke="#555" stroke-width="1"/>
  <text x="400" y="730" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">final answer</text>
  <path d="M 400 650 L 400 700" fill="none" stroke="#555" stroke-width="2"/>
  <polygon points="395,700 405,700 400,710" fill="#555"/>

  <!-- Input arrow from top -->
  <path d="M 400 100 L 400 130" fill="none" stroke="#555" stroke-width="2"/>
  <polygon points="395,130 405,130 400,140" fill="#555"/>
  <rect x="340" y="100" width="120" height="22" rx="4" fill="#1a1a1e" stroke="#555" stroke-width="1"/>
  <text x="400" y="115" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">your prompt</text>

  <!-- Footer -->
  <text x="400" y="880" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">pi-loop — the loop engineering pattern for Pi</text>
</svg>
